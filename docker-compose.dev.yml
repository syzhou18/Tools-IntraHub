version: '3.8'

services:
  # ------------------------------------
  # 資料庫服務 (PostgreSQL)
  # ------------------------------------
  db:
    image: postgres:16-alpine
    container_name: intrahub-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: company_assets
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network

  # ------------------------------------
  # 後端 API 服務 (Node.js)
  # ------------------------------------
  api:
    build: ./backend
    container_name: intrahub-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      DB_NAME: company_assets
      PORT: 3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - db
    networks:
      - app-network

  # ------------------------------------
  # 前端網頁服務 (Vue/Vite)
  # ------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: intrahub-web
    restart: always
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api
    networks:
      - app-network

volumes:
  postgres-dev-data:
    name: postgres-dev-data

networks:
  app-network:
    name: app-network
    driver: bridge
