services:
  # ------------------------------------
  # 資料庫服務 (PostgreSQL)
  # ------------------------------------
  db:
    image: postgres:16-alpine
    container_name: intrahub-development-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: intrahub
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intrahub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  # ------------------------------------
  # 後端 API 服務 (Node.js)
  # ------------------------------------
  api:
    build: ./backend
    container_name: intrahub-development-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      DB_NAME: intrahub
      PORT: 3000
    volumes:
      - ./backend:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ------------------------------------
  # 前端網頁服務 (Vue/Vite)
  # ------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: intrahub-development-web
    restart: always
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_DEV_API_TARGET=http://api:3000
    depends_on:
      - api
    networks:
      - app-network

volumes:
  postgres-dev-data:
    name: postgres-dev-data
  api_node_modules:
  web_node_modules:

networks:
  app-network:
    name: app-network
    driver: bridge