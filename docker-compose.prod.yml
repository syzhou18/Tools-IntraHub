version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # 1. 資料庫服務 (Database - PostgreSQL)
  # ----------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: intrahub-production-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: intrahub

    # [安全性提示]
    # 正式環境通常不對外開放 5432 埠，僅供內部的 api 服務連線。
    # 若需本地工具 (如 DBeaver) 連線調試，請取消下方註解：
    # ports:
    #   - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intrahub"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - postgres-production-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network

  # ----------------------------------------------------------------------------
  # 2. 後端 API 服務 (Backend - Node.js/Python/Go)
  # ----------------------------------------------------------------------------
  api:
    build: ./backend
    container_name: intrahub-production-api
    restart: always
    ports:
      - "3001:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      DB_NAME: company_assets
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ----------------------------------------------------------------------------
  # 3. 前端網頁服務 (Frontend - Nginx)
  # ----------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: intrahub-production-web
    restart: always
    ports:
      - "8090:80"
    depends_on:
      - api
    networks:
      - app-network

volumes:
  postgres-production-data:
    name: postgres-production-data

networks:
  app-network:
    driver: bridge
    name: app-network
